<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat PKL Sayang! ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="family">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --dusty-pink: #E8C5C8;
            --dusty-pink-dark: #D4A3A7;
            --sage-green: #E1E8D9;
            --sage-green-dark: #B9C8B1;
            --text-dark: #5A4E4E;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--sage-green);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 1. HEADER WITH ANIMATION */
        header {
            text-align: center;
            margin: 30px 0;
            padding: 0 15px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--dusty-pink-dark);
            margin-bottom: 10px;
            animation: heartbeat 1.5s infinite alternate;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        @keyframes heartbeat {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* CONTAINER UTAMA */
        .container {
            width: 100%;
            max-width: 500px; /* Dioptimalkan untuk tampilan HP yang nyaman */
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 2. GALLERY SECTION */
        .gallery-container {
            background: var(--white);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .gallery-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
            color: var(--dusty-pink-dark);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. SPOTIFY WIDGET CLONE */
        .spotify-widget {
            background: #191414; /* Warna khas Spotify hitam/gelap agar kontras */
            color: #FFFFFF;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .album-art {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            animation: rotateAlbum 8s linear infinite;
            animation-play-state: paused;
        }

        .spotify-widget.playing .album-art {
            animation-play-state: running;
        }

        .song-info {
            flex-grow: 1;
            overflow: hidden;
        }

        .song-title {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 0.8rem;
            color: #b3b3b3;
            margin-top: 2px;
        }

        .play-btn {
            background: #1DB954; /* Hijau Spotify */
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .play-btn:active {
            transform: scale(0.9);
        }

        @keyframes rotateAlbum {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 4. MOTIVATION QUOTES SECTION */
        .quote-box {
            background: var(--dusty-pink);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .quote-box i {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        #quote-text {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            transition: opacity 0.5s ease-in-out;
        }

        .fade-out {
            opacity: 0;
        }

        footer {
            margin-top: auto;
            padding: 30px 0 10px 0;
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Semangat PKL, Sayang!</h1>
        <div class="subtitle">Aku selalu mendukungmu di setiap langkah ✨</div>
    </header>

    <div class="container">
        <div class="gallery-container">
            <div class="gallery-title">💖 Sudut Kenangan Kita</div>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400&auto=format&fit=crop" alt="Romantis 1">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400&auto=format&fit=crop" alt="Romantis 2">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop" alt="Romantis 3">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?q=80&w=400&auto=format&fit=crop" alt="Romantis 4">
                </div>
            </div>
        </div>

        <div class="spotify-widget" id="spotifyWidget">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=200&auto=format&fit=crop" class="album-art" alt="Cover Lagu">
            <div class="song-info">
                <div class="song-title">Kisah Sempurna (Untuk Kamu)</div>
                <div class="song-artist">Playlist Penyemangat PKL</div>
            </div>
            <button class="play-btn" id="playBtn">
                <i class="fa-solid fa-play" id="playIcon"></i>
            </button>
            <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        </div>

        <div class="quote-box">
            <i class="fa-solid fa-quote-left"></i>
            <p id="quote-text">Loading ucapan manis untukmu...</p>
        </div>
    </div>

    <footer>
        Dibuat dengan segenap ❤️ untuk menyemangatimu hari ini.
    </footer>

    <script>
        // DATA KATA-KATA MOTIVASI (Berganti tiap 5 detik)
        const quotes = [
            "Jangan lelah ya hari ini! Ingat, setiap ilmu yang kamu dapat di tempat PKL bakal berguna banget buat masa depan kita. 🥰",
            "Kalau lagi capek atau pusing sama kerjaan, tarik napas dalam-dalam... Aku di sini selalu doain dan semangatin kamu! 🌸",
            "Kamu itu hebat dan tangguh. Masalah atau tugas sesulit apa pun di tempat PKL pasti bisa kamu selesaikan dengan baik! 💪",
            "Istirahat yang cukup ya, jangan lupa makan siang dan minum air putih yang banyak. Kesehatanmu nomor satu buat aku! 🍱",
            "Satu hari lagi terlewati dengan luar biasa! Aku bangga banget punya pasangan serajin dan sekeren kamu. ❤️"
        ];

        let currentQuoteIndex = 0;
        const quoteTextElem = document.getElementById('quote-text');

        function changeQuote() {
            quoteTextElem.classList.add('fade-out');
            
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                quoteTextElem.textContent = quotes[currentQuoteIndex];
                quoteTextElem.classList.remove('fade-out');
            }, 500); // Sinkron dengan transisi CSS (0.5 detik)
        }

        // Jalankan kutipan pertama langsung & set interval otomatis per 5 detik (5000ms)
        quoteTextElem.textContent = quotes[0];
        setInterval(changeQuote, 5000);


        // INTERAKSI SPOTIFY PLAYER
        const bgMusic = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const spotifyWidget = document.getElementById('spotifyWidget');

        playBtn.addEventListener('click', function() {
            if (bgMusic.paused) {
                bgMusic.play();
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                spotifyWidget.classList.add('playing');
            } else {
                bgMusic.pause();
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                spotifyWidget.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
